name: Generate contribution snake

on:
  schedule:
    # runs every day at 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake animations
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?color_snake=#e10600&color_dots=#ebedf0,#ffc1c0,#ff8785,#ff4d4d,#e10600
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#e10600&color_dots=#161b22,#3d0c0b,#7a0300,#c00500,#e10600

      - name: Push snake to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
